networks:
  zero_trust_net:
    driver: bridge

services:
  # 1. El Portafolio Dual (Modo Casual y PRO UI) — nginx sirve el estático de
  #    Astro y hace proxy de /api (SSE) hacia edge-api dentro de la red interna.
  frontend:
    build: .
    container_name: kawashiro_frontend
    restart: unless-stopped
    ports:
      # Acceso local mientras no haya dominio. En producción, Cloudflare lee el
      # puerto 80 por la red interna; este mapeo al host puede eliminarse.
      - "8181:80"
    depends_on:
      - edge-api
    networks:
      - zero_trust_net
    # Autocuración: si nginx deja de responder, Docker reinicia el contenedor
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 2. El Microservicio de Telemetría (FastAPI). Sin puerto al host: solo se
  #    alcanza vía el proxy /api de nginx (o el túnel Cloudflare en producción).
  edge-api:
    build: ./backend
    container_name: kawashiro_edge_api
    restart: unless-stopped
    expose:
      - "8000"
    # Para desarrollo con `npm run dev` (:4321), descomenta este mapeo: el proxy
    # Vite reenvía /api -> localhost:8000 y el comando htop recibe telemetría.
    # ports:
    #   - "8000:8000"
    # DNS explícito: el resolver del host es local-only e inaccesible desde
    # el contenedor; sin esto la llamada a Open-Meteo (weather) no resuelve.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      # Zona horaria fijada para logs coherentes en República Dominicana
      - TZ=America/Santo_Domingo
    # Persistencia del guestbook (SQLite) entre despliegues
    volumes:
      - edge_data:/data
    # Autocuración: si /health deja de responder, Docker reinicia el servicio
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - zero_trust_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 3. El Agente Perimetral de Cloudflare (Zero Trust).
  #    Túnel "kawashiroserver-pi": kawashiro.dev -> frontend:80 (proxy /api incluido).
  #    El token vive en .env (CLOUDFLARE_TUNNEL_TOKEN), fuera del repo.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: kawashiro_zero_trust
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    # DNS explícito: el host resuelve vía un resolver en 127.0.0.1 que no
    # existe dentro del contenedor; sin esto cloudflared no puede resolver
    # los SRV de argotunnel.com y el túnel muere en el arranque.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - frontend
    networks:
      - zero_trust_net
    # Watchtower solo actualiza contenedores con esta etiqueta
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # 4. Actualizador automático de imágenes externas (solo cloudflared).
  #    Las imágenes propias (frontend/edge-api) se reconstruyen en cada deploy.
  watchtower:
    image: containrrr/watchtower:latest
    container_name: kawashiro_watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    dns:
      - 1.1.1.1
    environment:
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
      # Un chequeo diario es suficiente para un túnel
      - WATCHTOWER_POLL_INTERVAL=86400
      # La imagen de watchtower negocia una API antigua; el daemon moderno exige >=1.40
      - DOCKER_API_VERSION=1.44
    networks:
      - zero_trust_net

volumes:
  edge_data:

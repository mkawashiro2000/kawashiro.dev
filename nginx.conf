server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compresión para maximizar TTFB en el Modo Casual (payload estático).
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Assets con hash: cache agresivo e inmutable.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Telemetría del homelab: proxy hacia el microservicio FastAPI (SSE).
    # Server-Sent Events exige desactivar el buffering y cerrar el timeout.
    location /api/ {
        # Resolución vía DNS embebido de Docker en tiempo de request: el
        # contenedor de nginx arranca aunque edge-api aún no esté listo, en
        # vez de fallar en el boot con "host not found in upstream".
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream_edge edge-api;
        proxy_pass http://$upstream_edge:8000$request_uri;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding off;
    }

    # SPA/estático: sirve el archivo o cae a index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

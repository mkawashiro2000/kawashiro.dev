# Rate limiting de la API: 10 req/s por IP con ráfagas cortas. Cloudflare ya
# filtra lo grueso; esto es defensa en profundidad contra abuso directo.
# (Este archivo se incluye dentro del bloque http, por eso la zona va aquí.)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    # Cabeceras de seguridad (Cloudflare añade TLS/HSTS; esto cubre el resto)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    root /usr/share/nginx/html;
    index index.html;

    # Redirecciones relativas (sin host:puerto): evita que nginx arme una URL
    # absoluta con el puerto interno (80) al añadir la barra final en rutas
    # de directorio, lo cual rompería el acceso detrás de un puerto externo
    # distinto (ej. 8181) o de un túnel/proxy inverso.
    absolute_redirect off;

    # Compresión para maximizar TTFB en el Modo Casual (payload estático).
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Assets con hash: cache agresivo e inmutable.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Telemetría del homelab: proxy hacia el microservicio FastAPI (SSE).
    # Server-Sent Events exige desactivar el buffering y cerrar el timeout.
    location /api/ {
        # Contención de abuso: hasta 10 r/s con ráfaga de 20 en cola
        limit_req zone=api_limit burst=20 nodelay;

        # Resolución vía DNS embebido de Docker en tiempo de request: el
        # contenedor de nginx arranca aunque edge-api aún no esté listo, en
        # vez de fallar en el boot con "host not found in upstream".
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream_edge edge-api;
        proxy_pass http://$upstream_edge:8000$request_uri;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding off;
    }

    # Estático multipágina (Astro): sirve el archivo o el índice del
    # directorio; las rutas inexistentes reciben la 404 temática real.
    error_page 404 /404.html;
    location / {
        try_files $uri $uri/ =404;
    }
}
